{% extends 'base.html' %}
{% block content %}
<h2>Восстановление пароля</h2>
<form method="post">
    {% csrf_token %}
    {{ form.non_field_errors }}
    <p>{{ form.email.label_tag }} {{ form.email }}</p>
    {% for error in form.email.errors %}<p class="error">{{ error }}</p>{% endfor %}
    <button type="submit">Отправить ссылку</button>
</form>
{% endblock %}
